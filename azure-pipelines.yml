trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'azure-service-connection'
  resourceGroupName: 'rg-experis-design-showcase'
  staticWebAppName: 'experis-design-showcase'

stages:
  - stage: Infrastructure
    displayName: 'Deploy Infrastructure'
    jobs:
      - job: DeployBicep
        displayName: 'Deploy Bicep Template'
        steps:
          - task: AzureCLI@2
            displayName: 'Deploy Bicep to Azure'
            name: deployInfra
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment sub create \
                  --location eastus2 \
                  --template-file infra/main.bicep \
                  --parameters infra/main.bicepparam \
                  --name experis-design-showcase-$(Build.BuildId)

                # Retrieve the deployment token for the Static Web App
                DEPLOYMENT_TOKEN=$(az staticwebapp secrets list \
                  --name $(staticWebAppName) \
                  --resource-group $(resourceGroupName) \
                  --query "properties.apiKey" \
                  --output tsv)

                echo "##vso[task.setvariable variable=deploymentToken;isOutput=true;issecret=true]$DEPLOYMENT_TOKEN"

  - stage: Deploy
    displayName: 'Deploy Website'
    dependsOn: Infrastructure
    variables:
      deploymentToken: $[ stageDependencies.Infrastructure.DeployBicep.outputs['deployInfra.deploymentToken'] ]
    jobs:
      - job: DeployContent
        displayName: 'Deploy to Static Web App'
        steps:
          - task: AzureStaticWebApp@0
            displayName: 'Deploy src/ to Static Web App'
            inputs:
              app_location: 'src'
              output_location: ''
              skip_app_build: true
              azure_static_web_apps_api_token: '$(deploymentToken)'
